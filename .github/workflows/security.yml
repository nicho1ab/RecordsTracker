name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install --upgrade pip pip-audit
      - name: Check for committed secrets
        run: python scripts/check_no_secrets.py
      - name: Run dependency audit
        run: pip-audit -r requirements.txt -r requirements-dev.txt
