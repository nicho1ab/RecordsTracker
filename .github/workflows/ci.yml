name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Tests
        run: pytest
      - name: Documentation check
        run: python scripts/check_docs.py
      - name: Verify required workflow contract
        run: python scripts/check_independent_verification.py
      - name: Verify pull request evidence and governed boundaries
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate "/repos/$GITHUB_REPOSITORY/pulls/${{ github.event.pull_request.number }}/files?per_page=100" --jq '.[].filename' > .verification-changed-files.txt
          python scripts/check_independent_verification.py --event-path "$GITHUB_EVENT_PATH" --changed-files .verification-changed-files.txt
