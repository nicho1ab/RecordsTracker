name: Bug report
description: Report a defect or regression
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: evidence
    attributes:
      label: Fixture/source evidence
